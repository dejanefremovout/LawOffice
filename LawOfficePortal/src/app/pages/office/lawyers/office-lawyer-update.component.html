<section class="page">
  <div class="page-header">
    <div>
      <h2 class="page-title">Update Lawyer</h2>
      <p class="page-subtitle">Edit lawyer details.</p>
    </div>
  </div>

  <div class="popup-notification" *ngIf="errorMessage()">
    <div class="popup-notification-content">
      <span class="notification-icon">⚠</span>
      <span class="notification-text">{{ errorMessage() }}</span>
      <button class="notification-close" (click)="closeError()" aria-label="Close error">&times;</button>
    </div>
  </div>

  <div class="panel">
    <form class="lawyer-form" (ngSubmit)="save()">
      <div class="form-group">
        <label for="firstName">First Name <span class="required">*</span></label>
        <input
          type="text"
          id="firstName"
          name="firstName"
          [(ngModel)]="firstName"
          required
          [disabled]="isSaving()"
          placeholder="Enter first name"
        />
      </div>

      <div class="form-group">
        <label for="lastName">Last Name <span class="required">*</span></label>
        <input
          type="text"
          id="lastName"
          name="lastName"
          [(ngModel)]="lastName"
          required
          [disabled]="isSaving()"
          placeholder="Enter last name"
        />
      </div>

      <div class="form-group">
        <label for="email">Email <span class="required">*</span></label>
        <input
          type="text"
          id="email"
          name="email"
          [(ngModel)]="email"
          required
          [disabled]="isSaving()"
          placeholder="Enter email address"
        />
      </div>

      <div class="form-actions">
        <button
          type="button"
          class="ghost-button"
          (click)="cancel()"
          [disabled]="isSaving()"
        >
          Cancel
        </button>
        <button
          type="submit"
          class="primary-button"
          [disabled]="isSaving()"
        >
          {{ isSaving() ? 'Saving...' : 'Save' }}
        </button>
      </div>
    </form>
  </div>
</section>
