<section class="page">
  <div class="page-header">
    <div>
      <h2 class="page-title">Update Hearing</h2>
      <p class="page-subtitle">Edit hearing details.</p>
    </div>
  </div>

  <div class="popup-notification" *ngIf="errorMessage()">
    <div class="popup-notification-content">
      <span class="notification-icon">⚠</span>
      <span class="notification-text">{{ errorMessage() }}</span>
      <button class="notification-close" (click)="closeError()" aria-label="Close error">&times;</button>
    </div>
  </div>

  <div class="panel">
    <form class="hearing-form" (ngSubmit)="save()">
      <div class="form-row">
        <div class="form-group">
          <label for="courtroom">Courtroom</label>
          <input
            type="text"
            id="courtroom"
            name="courtroom"
            [(ngModel)]="courtroom"
            [disabled]="isSaving()"
            placeholder="Enter courtroom"
          />
        </div>

        <div class="form-group">
          <label for="date">Date & Time <span class="required">*</span></label>
          <input
            type="datetime-local"
            id="date"
            name="date"
            [(ngModel)]="date"
            required
            [disabled]="isSaving()"
          />
        </div>
      </div>

      <div class="form-group">
        <label for="description">Description</label>
        <textarea
          id="description"
          name="description"
          [(ngModel)]="description"
          [disabled]="isSaving()"
          rows="4"
          placeholder="Enter hearing description"
        ></textarea>
      </div>

      <div class="form-group">
        <label class="checkbox-label">
          <input
            type="checkbox"
            name="held"
            [(ngModel)]="held"
            [disabled]="isSaving()"
          />
          <span>Hearing was held</span>
        </label>
      </div>

      <div class="form-actions">
        <button
          type="button"
          class="ghost-button"
          (click)="cancel()"
          [disabled]="isSaving()"
        >
          Cancel
        </button>
        <button
          type="submit"
          class="primary-button"
          [disabled]="isSaving()"
        >
          {{ isSaving() ? 'Saving...' : 'Save' }}
        </button>
      </div>
    </form>
  </div>
</section>
