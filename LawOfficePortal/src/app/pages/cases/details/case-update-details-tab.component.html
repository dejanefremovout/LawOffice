<form class="case-form" (ngSubmit)="onSave()">
  <div class="form-row">
    <div class="form-group">
      <label for="identificationNumber">ID Number <span class="required">*</span></label>
      <input
        type="text"
        id="identificationNumber"
        name="identificationNumber"
        [(ngModel)]="form.identificationNumber"
        required
        [disabled]="isSaving"
        placeholder="Enter identification number"
      />
    </div>

    <div class="form-group">
      <label for="year">Year</label>
      <input
        type="number"
        id="year"
        name="year"
        [(ngModel)]="form.year"
        min="1900"
        max="2100"
        [disabled]="isSaving"
        placeholder="Enter year"
      />
    </div>
  </div>

  <div class="form-group">
    <label for="description">Description</label>
    <textarea
      id="description"
      name="description"
      [(ngModel)]="form.description"
      [disabled]="isSaving"
      rows="4"
      placeholder="Enter case description"
    ></textarea>
  </div>

  <div class="form-group">
    <label for="clientIds">Clients <span class="required">*</span></label>
    <select
      id="clientIds"
      name="clientIds"
      [(ngModel)]="form.clientIds"
      [disabled]="isSaving"
      multiple
      required
    >
      <option *ngFor="let client of clients" [value]="client.id">
        {{ client.firstName }} {{ client.lastName }}
      </option>
    </select>
  </div>

  <div class="form-group">
    <label for="opposingPartyIds">Opposing Parties</label>
    <select
      id="opposingPartyIds"
      name="opposingPartyIds"
      [(ngModel)]="form.opposingPartyIds"
      [disabled]="isSaving"
      multiple
    >
      <option *ngFor="let opposingParty of opposingParties" [value]="opposingParty.id">
        {{ opposingParty.firstName }} {{ opposingParty.lastName }}
      </option>
    </select>
  </div>

  <div class="form-row">
    <div class="form-group">
      <label for="city">City</label>
      <input
        type="text"
        id="city"
        name="city"
        [(ngModel)]="form.city"
        [disabled]="isSaving"
        placeholder="Enter city"
      />
    </div>

    <div class="form-group">
      <label for="competentCourt">Competent Court</label>
      <input
        type="text"
        id="competentCourt"
        name="competentCourt"
        [(ngModel)]="form.competentCourt"
        [disabled]="isSaving"
        placeholder="Enter competent court"
      />
    </div>
  </div>

  <div class="form-row">
    <div class="form-group">
      <label for="judge">Judge</label>
      <input
        type="text"
        id="judge"
        name="judge"
        [(ngModel)]="form.judge"
        [disabled]="isSaving"
        placeholder="Enter judge"
      />
    </div>

    <div class="form-group form-checkbox">
      <label for="active">Status</label>
      <label class="checkbox-label">
        <input
          type="checkbox"
          id="active"
          name="active"
          [(ngModel)]="form.active"
          [disabled]="isSaving"
        />
        <span>Active case</span>
      </label>
    </div>
  </div>

  <div class="form-actions">
    <button
      type="button"
      class="ghost-button"
      (click)="onCancel()"
      [disabled]="isSaving"
    >
      Cancel
    </button>
    <button
      type="submit"
      class="primary-button"
      [disabled]="isSaving"
    >
      {{ isSaving ? 'Saving...' : 'Save' }}
    </button>
  </div>
</form>
