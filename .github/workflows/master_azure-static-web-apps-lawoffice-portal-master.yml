name: Azure Static Web Apps CI/CD - Master

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - 'LawOfficePortal/**'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - master

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    environment: LawOfficeEnvironment
    permissions:
      id-token: write
      contents: read
    env:
      MASTER_OFFICE_MANAGEMENT_URL: ${{ vars.MASTER_OFFICE_MANAGEMENT_URL }}
      MASTER_PARTY_MANAGEMENT_URL: ${{ vars.MASTER_PARTY_MANAGEMENT_URL }}
      MASTER_CASE_MANAGEMENT_URL: ${{ vars.MASTER_CASE_MANAGEMENT_URL }}
      MASTER_REDIRECT_URL: ${{ vars.MASTER_REDIRECT_URL }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Generate runtime config.js
        shell: bash
        run: |
          OFFICE_MANAGEMENT_URL="$MASTER_OFFICE_MANAGEMENT_URL"
          PARTY_MANAGEMENT_URL="$MASTER_PARTY_MANAGEMENT_URL"
          CASE_MANAGEMENT_URL="$MASTER_CASE_MANAGEMENT_URL"
          REDIRECT_URL="$MASTER_REDIRECT_URL"

          if [ -z "$OFFICE_MANAGEMENT_URL" ] || [ -z "$PARTY_MANAGEMENT_URL" ] || [ -z "$CASE_MANAGEMENT_URL" ] || [ -z "$REDIRECT_URL" ]; then
            echo "Missing required MASTER API base URL values"
            exit 1
          fi

          cat > LawOfficePortal/public/config.js <<EOF
          window.__env = {
            API_BASE_URL: {
              OFFICE_MANAGEMENT: '$OFFICE_MANAGEMENT_URL',
              PARTY_MANAGEMENT: '$PARTY_MANAGEMENT_URL',
              CASE_MANAGEMENT: '$CASE_MANAGEMENT_URL'
            },
            REDIRECT_URL: '$REDIRECT_URL'
          };
          EOF

      - name: Install OIDC Client from Core Package
        run: npm install @actions/core@1.6.0 @actions/http-client

      - name: Get Id Token
        uses: actions/github-script@v6
        id: idtoken
        with:
          script: |
            const coredemo = require('@actions/core')
            return await coredemo.getIDToken()
          result-encoding: string

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_LAWOFFICE_PORTAL_MASTER }}
          action: "upload"
          app_location: "./LawOfficePortal"
          api_location: ""
          output_location: "dist/lawyer-office-portal/browser"
          github_id_token: ${{ steps.idtoken.outputs.result }}

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_LAWOFFICE_PORTAL_MASTER }}
          action: "close"
